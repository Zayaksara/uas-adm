# ============================================================
#  CI/CD — Web DINAMIS (Next.js)
#  Paths filter: hanya jalan saat kode aplikasi dinamis berubah,
#  sehingga pipeline terisolasi & hemat runner (rubrik "Sangat Baik").
# ============================================================
name: Deploy Web Dinamis (Next.js)
# trigger awal

on:
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "db/**"
      - "public/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "auth.ts"
      - "auth.config.ts"
      - "proxy.ts"
      - ".github/workflows/deploy-dynamic.yml"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/uas-portofolio-dynamic

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image dinamis
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Salin docker-compose.yml ke EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy di EC2 (zero-downtime)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull web-dynamic
            docker compose up -d web-dynamic
            docker image prune -f
