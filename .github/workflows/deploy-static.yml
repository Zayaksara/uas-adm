# ============================================================
#  CI/CD — Web STATIS (CV) + reverse proxy
#  Paths filter: hanya jalan saat web statis / konfigurasi proxy
#  berubah. Pipeline terisolasi dari web dinamis.
# ============================================================
name: Deploy Web Statis (CV + Proxy)
# trigger ulang 2

on:
  push:
    branches: [main, master]
    paths:
      - "static-cv/**"
      - "proxy/**"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/uas-portofolio-proxy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image proxy (berisi web statis)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./proxy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Salin docker-compose.yml ke EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy di EC2 (zero-downtime)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull proxy
            docker compose up -d proxy
            docker image prune -f
