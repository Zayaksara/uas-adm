# ============================================================
#  Reverse proxy / static server — UAS 2388010024
#  :80   -> Web Statis CV (file di /usr/share/nginx/html)
#  :8080 -> reverse-proxy ke Next.js (service "web-dynamic")
# ============================================================

# --- Port 80: Web Statis CV ---
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Port 8080: Reverse proxy ke aplikasi dinamis Next.js ---
server {
    listen 8080;
    server_name _;

    location / {
        # "web-dynamic" = DNS internal Docker (nama service di compose)
        proxy_pass http://web-dynamic:3000;
        proxy_http_version 1.1;
        # $http_host menyertakan port (mis. 54.254.231.65:8080) supaya
        # cocok dengan header `origin` -> Server Actions Next.js tidak ditolak.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
